<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ginger Laser</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 400;
        }

        body {
            background-color: #0d1117;
            color: #e6edf3;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 75px;
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            height: 125px;
        }

        header h1 {
            font-size: 1.8rem;
        }

        nav a {
            font-size: 1rem;
            color: #9da7b3;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #e6edf3;
        }

        /* Layout */
        .container {
            padding: 50px 80px;
        }

        /* Sections */

        .section {
            margin-bottom: 30px;
        }

        .section-header {
            cursor: pointer;
            padding-bottom: 12px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            font-size: 1.5rem;
        }

        .arrow {
            font-size: 1.6rem;
            color: #9da7b3;
            transition: transform 0.3s ease;
        }

            .section-content {
            height: 0;
            overflow: hidden;
            transition: height 0.4s ease;
        }

        .section-content .inner {
            padding-top: 25px;
        }

        .section.open .arrow {
            transform: rotate(180deg);
        }

        /* Grid */
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 37.5px;
        }

        /* Cards */
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            height: 250px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .card-content h2 {
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .card-content p {
            font-size: 0.9rem;
            color: #9da7b3;
        }

    </style>
</head>

<body>

    <header>
        <h1>The Ginger Laser</h1>
        <nav>
            <a href="about.html">About</a>
        </nav>
    </header>

    <div class="container">

        <div class="section">
            <div class="section-header" onclick="toggleSection(this)">
                <h2>Math</h2>
                <span class="arrow">▾</span>
            </div>
            <div class="section-content">
                <div class="inner">
                    <div class="grid">

                        <a href="linear-algebra.html">
                            <div class="card">
                                <div class="card-content">
                                    <h2>Linear Algebra</h2>
                                </div>
                            </div>
                        </a>

                        <a href="calculus.html">
                            <div class="card">
                                <div class="card-content">
                                    <h2>Calculus</h2>
                                </div>
                            </div>
                        </a>

                        <a href="trigonometry.html">
                            <div class="card">
                                <div class="card-content">
                                    <h2>Trigonometry</h2>
                                </div>
                            </div>
                        </a>

                    </div>
                </div>
            </div>
        </div>

        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>Physics</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>
        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>Biology</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>
        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>Chemistry</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>
        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>Entomology</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>
        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>Ornithology</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>
        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>Anatomy</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>
        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>French</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>
        <div class="section"><div class="section-header" onclick="toggleSection(this)"><h2>Russian</h2><span class="arrow">▾</span></div><div class="section-content"><div class="inner"></div></div></div>

    </div>

    <script>
        function toggleSection(header) {
            const section = header.parentElement;
            const content = section.querySelector(".section-content");

            if (section.classList.contains("open")) {
                // CLOSE
                content.style.height = content.scrollHeight + "px"; // set current height
                requestAnimationFrame(() => {
                    content.style.height = "0px";
                });
                section.classList.remove("open");
            } else {
                // OPEN
                content.style.height = content.scrollHeight + "px";
                section.classList.add("open");

                // After animation, reset to auto so it adapts to content
                content.addEventListener("transitionend", function handler() {
                    content.style.height = "auto";
                    content.removeEventListener("transitionend", handler);
                });
            }
        }
    </script>
    
</body>
</html>
